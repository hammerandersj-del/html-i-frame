<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Post Mockup 2026</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    padding-top: 50px;
    margin: 0;
  }

  .post-container {
    width: 500px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    padding: 12px 16px;
    color: #050505;
  }

  /* Header sektion */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
  }

  .profile-pic {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
    object-fit: cover;
  }

  .name-area {
    display: flex;
    flex-direction: column;
  }

  .name {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
  }

  .verified-badge {
    width: 15px;
    height: 15px;
    margin-left: 4px;
    fill: #1877F2;
  }

  .post-info {
    font-size: 13px;
    color: #65676b;
    display: flex;
    align-items: center;
    margin-top: 2px;
  }

  /* Din globus-erstatning */
  .globus-img {
    width: 12px;
    height: 12px;
    margin-left: 4px;
    object-fit: contain;
    opacity: 0.7; /* Gør den lidt diskret som den ægte vare */
  }

  .more-options {
    color: #65676b;
    font-size: 20px;
    cursor: pointer;
    font-weight: bold;
    padding: 0 8px;
  }

  /* Indhold */
  .content {
    font-size: 15px;
    line-height: 1.3333;
    margin: 12px 0;
    white-space: pre-wrap;
  }

  /* Statistik Bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 14px;
    color: #65676b;
    border-bottom: 1px solid #ced0d4;
  }

  .reactions {
    display: flex;
    align-items: center;
  }

  /* Din Like-erstatning */
  .reaction-icon {
    width: 30px;
    height: 30px;
    margin-right: 4px;
    object-fit: contain;
  }

  /* Knapper i bunden */
  .actions {
    display: flex;
    padding: 4px 0;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    color: #65676b;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
  }

  .action-btn:hover {
    background-color: #f2f2f2;
  }
</style>
</head>
<body>

<div class="post-container">
  <div class="header">
    <div class="header-left">
      <img src="1-66fa95ac.jpg" class="profile-pic" alt="Profilbillede">
      <div class="name-area">
        <div class="name">
          Peter Larsen (Socialdemokratiet)
          <svg class="verified-badge" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6.4 13l1.5-1.5 2.2 2.2 5.4-5.4 1.5 1.5-6.9 6.9z"/></svg>
        </div>
        <div class="post-info">
          I går kl. 15.01 · 
          <img src="707598-middle.png" class="globus-img" alt="Public">
        </div>
      </div>
    </div>
    <div class="more-options">...</div>
  </div>

  <div class="content">Dansk Folkeparti er skamløse og kvalmende at se og høre på. De lyver og bedrager. Det er bedst for Kongeriget Danmark, hvis I tier helt stille.</div>

  <div class="stats-bar">
    <div class="reactions">
      <img src="unnamed.png" class="reaction-icon" alt="like">
      <span>349</span>
    </div>
    <div class="comments-shares">
      45 kommentarer · 16 delinger
    </div>
  </div>

  <div class="actions">
    <div class="action-btn">Synes godt om</div>
    <div class="action-btn">Kommenter</div>
    <div class="action-btn">Del</div>
  </div>
</div>

</body>
</html>
