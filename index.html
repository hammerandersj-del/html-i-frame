<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Post Mockup 2026</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    /* Baggrunden er nu hvid, så kun opslaget ses */
    background-color: #ffffff; 
    margin: 0;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .post-container {
    width: 500px;
    background: white;
    /* Vi beholder en meget svag kant, så man kan se opslagets form mod den hvide baggrund */
    border: 1px solid #ced0d4;
    border-radius: 8px;
    padding: 12px 16px;
    color: #050505;
  }

  /* Header sektion */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
  }

  .profile-pic {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
    object-fit: cover;
  }

  .name-area {
    display: flex;
    flex-direction: column;
  }

  .name {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
  }

  .verified-badge {
    width: 15px;
    height: 15px;
    margin-left: 4px;
    fill: #1877F2;
  }

  .post-info {
    font-size: 13px;
    color: #65676b;
    display: flex;
    align-items: center;
    margin-top: 2px;
  }

  .globus-img {
    width: 12px;
    height: 12px;
    margin-left: 4px;
    object-fit: contain;
    opacity: 0.7;
  }

  .more-options {
    color: #65676b;
    font-size: 20px;
    cursor: pointer;
    font-weight: bold;
    padding: 0 8px;
  }

  /* Indhold */
  .content {
    font-size: 15px;
    line-height: 1.3333;
    margin: 12px 0;
    white-space: pre-wrap;
  }

  /* Statistik Bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 14px;
    color: #65676b;
  }

  .reactions {
    display: flex;
    align-items: center;
  }

  .reaction-icon {
    width: 16px;
    height: 16px;
    margin-right: 4px;
    object-fit: contain;
  }
</style>
</head>
<body>

<div class="post-container">
  <div class="header">
    <div class="header-left">
      <img src="1-66fa95ac.jpg" class="profile-pic" alt="Profilbillede">
      <div class="name-area">
        <div class="name">
          Peter Larsen
          <svg class="verified-badge" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6.4 13l1.5-1.5 2.2 2.2 5.4-5.4 1.5 1.5-6.9 6.9z"/></svg>
        </div>
        <div class="post-info">
          I går kl. 15.01 · 
          <img src="707598-middle.png" class="globus-img" alt="Public">
        </div>
      </div>
    </div>
    <div class="more-options">...</div>
  </div>

  <div class="content">I Skotland har de en indført en lov, der gør menstruationsprodukter gratis på offentlige institutioner. Der er snak om, at dette også bør indføres i Danmark. Vi har brug for en klar politisk linje, der tager dette seriøst.

  <div class="stats-bar">
    <div class="reactions">
      <img src="Facebook_Like_button.svg.png" class="reaction-icon" alt="like">
      <span>349</span>
    </div>
    <div class="comments-shares">
      45 kommentarer · 16 delinger
    </div>
  </div>
</div>

</body>
</html>
